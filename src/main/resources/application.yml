spring:
  application:
    name: uni-secret-manager-demo

server:
  port: 8080

# Base secret manager configuration (shared across profiles)
secrets:
  enabled: true
  cache:
    enabled: true
    ttl: 5m
    max-size: 1000
  retry:
    max-attempts: 3
    initial-delay: 1s
    multiplier: 2.0
    max-delay: 10s

logging:
  level:
    io.github.timhwang777.unisecret: INFO
    io.github.timhwang777.unisecretdemo: DEBUG
