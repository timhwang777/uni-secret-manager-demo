# Staging-Vault profile: Vault primary, AWS (LocalStack) secondary, local fallback
# Docker-only — no GCP credentials needed
secrets:
  provider-order:
    - vault
    - aws
    - local
  fail-on-missing: true

  vault:
    enabled: true
    host: localhost
    port: 8200
    scheme: http
    auth-method: TOKEN
    token: ${VAULT_TOKEN:dev-only-token}
    mount: secret
    kv-version: 2

  aws:
    enabled: true
    region: us-east-1
    endpoint: http://localhost:4566  # LocalStack

  local:
    enabled: true
    secrets:
      rotating-secret: "staging-vault-rotating-value"
      nested-config: '{"database":{"connection":{"host":"staging-vault-db.local","password":"staging-vault-nested-pass","port":5432}},"cache":{"redis":{"host":"staging-vault-redis.local","port":6379}}}'
      optional-feature: "disabled-in-staging-vault"
      gcp-api-key: "staging-vault-local-fallback"

  cache:
    ttl: 3m
